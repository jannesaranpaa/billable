{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Billables tracker{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'style.css' %}">
</head>
<body>

    <nav>
        {% if request.session.user_id %}
            <a href="/entries/">Entries</a>
            
            {% if request.session.is_admin %}
                <a href="/admin/">Admin</a>
            {% endif %}
            
            <a href="/logout/" style="float: right; color: #ff4d4d;">Logout ({{ request.session.username }})</a>
        {% else %}
            <a href="/login/">Login</a>
        {% endif %}
    </nav>

    <div class="container">
        {% block content %}
        {% endblock %}
    </div>

</body>
</html>
